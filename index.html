<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Control Tanques AQ</title>
    <style>
        :root { --blue: #2563eb; --bg: #f1f5f9; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; }
        .tab { display: none; padding: 15px; }
        .tab.active { display: block; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 20px; }
        .chip { background: white; border: 1px solid #ccc; padding: 10px 2px; text-align: center; border-radius: 8px; font-weight: bold; font-size: 11px; cursor: pointer; }
        .chip.sel { background: #dbeafe; border: 2px solid var(--blue); color: var(--blue); }
        .btn-ok { width: 100%; background: #22c55e; color: white; padding: 15px; border: none; border-radius: 8px; font-weight: bold; }
        nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #ddd; height: 60px; }
        nav button { flex: 1; border: none; background: none; font-weight: bold; color: #64748b; font-size: 10px; text-transform: uppercase; }
        nav button.act { color: var(--blue); border-top: 3px solid var(--blue); }
    </style>
</head>
<body onload="iniciar()">

    <div id="p0" class="tab active">
        <h2>P0: AG25-AG44</h2>
        <input type="date" id="date0" style="width:100%; padding:10px; margin-bottom:10px;">
        <div id="g0" class="grid"></div>
        <button class="btn-ok" onclick="guardar('date0')">INSERTAR P0</button>
    </div>

    <div id="p1" class="tab">
        <h2>P1: AG01-AG24</h2>
        <input type="date" id="date1" style="width:100%; padding:10px; margin-bottom:10px;">
        <div id="g1" class="grid"></div>
        <button class="btn-ok" onclick="guardar('date1')">INSERTAR P1</button>
    </div>

    <div id="p2" class="tab">
        <h2>P2: AN/AP</h2>
        <input type="date" id="date2" style="width:100%; padding:10px; margin-bottom:10px;">
        <div id="g2" class="grid"></div>
        <button class="btn-ok" onclick="guardar('date2')">INSERTAR P2</button>
    </div>

    <div id="p3" class="tab">
        <h2>RESUMEN</h2>
        <div id="resumen-lista"></div>
    </div>

    <nav>
        <button id="b0" class="act" onclick="ir('p0')">P0</button>
        <button id="b1" onclick="ir('p1')">P1</button>
        <button id="b2" onclick="ir('p2')">P2</button>
        <button id="b3" onclick="ir('p3')">RES</button>
    </nav>

    <script>
        let db = JSON.parse(localStorage.getItem('tanques_db')) || [];
        let seleccion = [];

        function iniciar() {
            const hoy = new Date().toISOString().split('T')[0];
            document.querySelectorAll('input').forEach(i => i.value = hoy);
            
            generar('g0', 25, 44, 'AG');
            generar('g1', 1, 24, 'AG');
            generar('g2', 1, 24, 'AN');
        }

        function generar(id, ini, fin, pref) {
            const cont = document.getElementById(id);
            for(let i=ini; i<=fin; i++) {
                let t = pref + String(i).padStart(2,'0');
                cont.innerHTML += `<div class="chip" id="${t}" onclick="seleccionar('${t}')">${t}</div>`;
            }
        }

        function seleccionar(t) {
            const btn = document.getElementById(t);
            btn.classList.toggle('sel');
            if(btn.classList.contains('sel')) seleccion.push(t);
            else seleccion = seleccion.filter(item => item !== t);
        }

        function guardar(dateId) {
            if(seleccion.length === 0) return alert("Selecciona tanques");
            const fecha = document.getElementById(dateId).value;
            // Nueva lógica: X1=2d, X3=4d, X5=6d (Sumamos 1, 3, 5 días respectivamente)
            seleccion.forEach(t => {
                let d = new Date(fecha+'T00:00:00');
                d.setDate(d.getDate() + 1); // AQ X1 = 2 días total
                db.push({ tanque: t, vence: d.toISOString().split('T')[0], tipo: "AQ X1" });
            });
            localStorage.setItem('tanques_db', JSON.stringify(db));
            alert("Guardado");
            location.reload();
        }

        function ir(id) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('act'));
            document.getElementById(id).classList.add('active');
            document.getElementById('b'+id.replace('p','')).classList.add('act');
            if(id === 'p3') mostrarResumen();
        }

        function mostrarResumen() {
            const lista = document.getElementById('resumen-lista');
            lista.innerHTML = "";
            const hoy = new Date().toISOString().split('T')[0];
            db = db.filter(r => r.vence >= hoy);
            localStorage.setItem('tanques_db', JSON.stringify(db));
            db.forEach(r => {
                lista.innerHTML += `<div style="background:white; padding:10px; margin-bottom:5px;"><b>${r.tanque}</b> - Vence: ${r.vence}</div>`;
            });
        }
    </script>
</body>
</html>
