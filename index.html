<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Tanques AQ</title>
    <style>
        body { font-family: sans-serif; background: #f1f5f9; margin: 0; padding-bottom: 80px; }
        
        /* Sistema de pestañas: ocultas por defecto */
        .tab { display: none; padding: 20px; }
        .tab.active { display: block; }
        
        /* Navegación fija abajo */
        nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 2px solid #ddd; height: 60px; }
        nav button { flex: 1; border: none; background: white; font-weight: bold; color: #64748b; cursor: pointer; }
        nav button.act { color: #2563eb; border-top: 3px solid #2563eb; }
        
        /* Elementos del contenido */
        .card { background: white; padding: 15px; margin-bottom: 10px; border-radius: 8px; border-left: 5px solid #22c55e; }
        .btn-guardar { width: 100%; padding: 15px; background: #22c55e; color: white; border: none; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body onload="iniciar()">

    <div id="p0" class="tab active">
        <h2>Tanques</h2>
        <input type="date" id="date0" style="width:100%; padding:10px; margin-bottom:10px;">
        <div id="g0">
            <button onclick="guardarTanque('AG25')">Guardar AG25</button>
            <button onclick="guardarTanque('AG26')">Guardar AG26</button>
        </div>
    </div>

    <div id="p3" class="tab">
        <h2>RESUMEN</h2>
        <div id="resumen-lista"></div>
    </div>

    <nav>
        <button id="nav-p0" class="act" onclick="ir('p0')">P0</button>
        <button id="nav-p3" onclick="ir('p3')">RES</button>
    </nav>

    <script>
        let db = JSON.parse(localStorage.getItem('tanques_db')) || [];

        function iniciar() {
            const hoy = new Date();
            const fechaLocal = hoy.getFullYear() + '-' + String(hoy.getMonth() + 1).padStart(2, '0') + '-' + String(hoy.getDate()).padStart(2, '0');
            document.getElementById('date0').value = fechaLocal;
            actualizarResumen();
        }

        // Función crítica para cambiar pestañas
        function ir(tabId) {
            // 1. Ocultar todas las pestañas
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            // 2. Quitar clase activa de botones
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('act'));
            
            // 3. Mostrar la seleccionada
            document.getElementById(tabId).classList.add('active');
            document.getElementById('nav-' + tabId).classList.add('act');
            
            // Si es la pestaña de resumen, actualizarla al entrar
            if(tabId === 'p3') actualizarResumen();
        }

        function guardarTanque(t) {
            const fechaInput = document.getElementById('date0').value;
            db.push({ tanque: t, vence: fechaInput, tipo: "AQ X1" });
            localStorage.setItem('tanques_db', JSON.stringify(db));
            alert("Guardado: " + t);
            actualizarResumen();
        }

        function actualizarResumen() {
            const lista = document.getElementById('resumen-lista');
            lista.innerHTML = "";
            const hoyStr = new Date().toISOString().split('T')[0];

            db = db.filter(r => r.vence >= hoyStr);
            localStorage.setItem('tanques_db', JSON.stringify(db));

            db.forEach(r => {
                lista.innerHTML += `<div class="card"><b>${r.tanque}</b> - ${r.tipo}<br>Vence: ${r.vence}</div>`;
            });
        }
    </script>
</body>
</html>
